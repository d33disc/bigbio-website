name: Deploy via SSH (Alternative)

on:
  workflow_dispatch: # Manual trigger only for testing

jobs:
  deploy-ssh:
    name: Deploy via SSH/rsync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run type-check
          npm run test:unit

      - name: Build production bundle
        run: npm run build

      - name: Create .htaccess
        run: |
          cat > out/.htaccess << 'EOF'
          # Apache configuration for Next.js static site
          RewriteEngine On

          # Force HTTPS
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

          # Handle trailing slashes
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteCond %{REQUEST_URI} !(.*)/$
          RewriteRule ^(.*)$ $1/ [L,R=301]

          # Serve index.html for directories
          DirectoryIndex index.html

          # Error pages
          ErrorDocument 404 /404.html

          # Security headers
          Header set X-Content-Type-Options "nosniff"
          Header set X-Frame-Options "SAMEORIGIN"
          Header set X-XSS-Protection "1; mode=block"
          Header set Referrer-Policy "strict-origin-when-cross-origin"

          # Cache control for static assets
          <FilesMatch "\.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
          </FilesMatch>

          # Compress text files
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/plain
            AddOutputFilterByType DEFLATE text/html
            AddOutputFilterByType DEFLATE text/css
            AddOutputFilterByType DEFLATE application/javascript
            AddOutputFilterByType DEFLATE application/json
          </IfModule>
          EOF

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 bigbio.ai >> ~/.ssh/known_hosts || true
          ssh-keyscan -p 22 216.194.171.244 >> ~/.ssh/known_hosts || true

      - name: Deploy with rsync
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p 22" \
            --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            ./out/ \
            bigbio5@bigbio.ai:/home/bigbio5/public_html/

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 10

          response=$(curl -s -o /dev/null -w "%{http_code}" https://bigbio.ai)

          if [ "$response" = "200" ]; then
            echo "✅ Deployment successful! Site is live at https://bigbio.ai"
          else
            echo "⚠️ Site returned HTTP $response. Please check manually."
            exit 1
          fi