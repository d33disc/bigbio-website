name: Deploy to InMotion Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deployments

jobs:
  test:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:unit

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: |
          npm run build
          echo "Build complete: $(find out -type f | wc -l) files"

      - name: Create .htaccess in build
        run: |
          cat > out/.htaccess << 'EOF'
          # Apache configuration for Next.js static site
          RewriteEngine On

          # Force HTTPS
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

          # Handle trailing slashes (Next.js static export uses them)
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteCond %{REQUEST_URI} !(.*)/$
          RewriteRule ^(.*)$ $1/ [L,R=301]

          # Serve index.html for directories
          DirectoryIndex index.html

          # Error pages
          ErrorDocument 404 /404.html

          # Security headers
          Header set X-Content-Type-Options "nosniff"
          Header set X-Frame-Options "SAMEORIGIN"
          Header set X-XSS-Protection "1; mode=block"
          Header set Referrer-Policy "strict-origin-when-cross-origin"

          # Cache control for static assets
          <FilesMatch "\.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
          </FilesMatch>

          # Compress text files
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/plain
            AddOutputFilterByType DEFLATE text/html
            AddOutputFilterByType DEFLATE text/css
            AddOutputFilterByType DEFLATE application/javascript
            AddOutputFilterByType DEFLATE application/json
          </IfModule>
          EOF

      - name: Debug FTP Settings
        run: |
          echo "FTP Server: ${{ secrets.FTP_SERVER }}"
          echo "FTP Username: ${{ secrets.FTP_USERNAME }}"
          echo "Server Directory: /home/bigbio5/public_html/"
          echo "Testing FTP connection..."

          # Test connection without deploying
          timeout 10 curl -v ftp://${{ secrets.FTP_SERVER }} \
            --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }} \
            --list-only 2>&1 | head -20 || echo "FTP test completed"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /home/bigbio5/public_html/
          local-dir: ./out/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false # Don't delete existing files first
          log-level: verbose # Add verbose logging

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 10

          # Check if site is accessible
          response=$(curl -s -o /dev/null -w "%{http_code}" https://bigbio.ai)

          if [ "$response" = "200" ]; then
            echo "✅ Deployment successful! Site is live at https://bigbio.ai"
          else
            echo "⚠️ Site returned HTTP $response. Please check manually."
            exit 1
          fi

      - name: Create deployment annotation
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7)
            const message = `Deployed ${sha} to production at https://bigbio.ai`

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://bigbio.ai',
              description: message,
              context: 'Production Deployment'
            })
