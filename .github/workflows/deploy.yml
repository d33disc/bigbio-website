name: Deploy to InMotion Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deployments

jobs:
  test:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:unit

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: |
          npm run build
          echo "Build complete: $(find out -type f | wc -l) files"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /home/bigbio5/public_html/
          local-dir: ./out/
          protocol: ftp
          port: 21
          dangerous-clean-slate: true # Delete ALL existing files before upload
          log-level: verbose # Add verbose logging

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 10

          # Check if site is accessible
          response=$(curl -s -o /dev/null -w "%{http_code}" https://bigbio.ai)

          echo "Site returned HTTP $response"

          # Don't fail the build for now while we debug
          if [ "$response" = "200" ]; then
            echo "✅ Deployment successful! Site is live at https://bigbio.ai"
          else
            echo "⚠️ Site returned HTTP $response. Files uploaded but may need manual configuration."
            echo "Check https://bigbio.ai to verify deployment"
          fi

      - name: Create deployment annotation
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7)
            const message = `Deployed ${sha} to production at https://bigbio.ai`

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://bigbio.ai',
              description: message,
              context: 'Production Deployment'
            })
