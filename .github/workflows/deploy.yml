name: Deploy to InMotion Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deployments

jobs:
  test:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:unit

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: |
          npm run build
          echo "Build complete: $(find out -type f | wc -l) files"

      - name: Install SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -P "passphrase" -e rsync \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            -avz --delete \
            --exclude='.well-known' \
            --exclude='.htaccess' \
            ./out/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/bigbio5/public_html/

      - name: Verify deployment
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" https://bigbio.ai)
          echo "Site returned HTTP $response"
          if [ "$response" = "200" ]; then
            echo "Deployment successful! Site is live at https://bigbio.ai"
          else
            echo "Site returned HTTP $response — check https://bigbio.ai"
          fi

      - name: Create deployment annotation
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7)
            const message = `Deployed ${sha} to production at https://bigbio.ai`

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://bigbio.ai',
              description: message,
              context: 'Production Deployment'
            })

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
